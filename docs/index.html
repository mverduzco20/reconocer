<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reconocer — Sobre el proyecto</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<audio id="global-audio" loop preload="auto">
   <source src="../audio/Sonidopag-.mp4" type="video/mp4">
</audio>
    <main style="padding:20px; min-height:100vh;">
        <h1 class="reconocer-title">Sobre el proyecto</h1>
        <p>Documentación y notas del proyecto.</p>
    </main>

    <footer class="site-footer">
       <button class="sound-btn" id="sound-btn" aria-label="sonido">
           <span class="sound-icon"></span>
           <input type="range" class="volume-slider" id="volume-slider" 
                  min="0" max="1" step="0.05" value="0" 
                  onclick="event.stopPropagation()">
       </button>
       <div class="footer-left" style="margin-left: 30px; flex: 1;">
           <a href="../docs/index.html" class="footer-link footer-link-lg active-page">(SOBRE EL PROYECTO)</a>
       </div>
       <div class="footer-center" style="position:absolute; left:50%; transform:translateX(-50%);">
           <a href="../index.html" class="footer-link footer-link-lg">(INICIO)</a>
       </div>
       <div class="footer-right" style="margin-right: 30px;">
           <a href="../map.html" class="footer-link footer-link-lg">(CARTOGRAFÍA)</a>
       </div>
    </footer>
    <script>
    document.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', function(e) {
            const href = this.getAttribute('href');
            if (!href || href.startsWith('#') || href.startsWith('javascript')) return;
            e.preventDefault();
            document.body.style.transition = 'opacity 350ms ease';
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = href; }, 360);
        });
    });
    </script>
    <script>
const audio = document.getElementById('global-audio');
const volumeSlider = document.getElementById('volume-slider');

// Start muted
audio.volume = 0;
audio.play().catch(() => {});

if (volumeSlider) {
   volumeSlider.value = 0;

   volumeSlider.addEventListener('input', function(e) {
       e.stopPropagation();
       const val = parseFloat(this.value);
       audio.volume = val;
       const isOn = val > 0;
       this.classList.toggle('active', isOn);
       // Save state
       localStorage.setItem('audioVolume', val);
       localStorage.setItem('audioTime', audio.currentTime);
   });

   volumeSlider.addEventListener('click', function(e) {
       e.stopPropagation();
       if (parseFloat(this.value) === 0) {
           this.value = 1;
           audio.volume = 1;
           this.classList.add('active');
           localStorage.setItem('audioVolume', 1);
       }
   });
}

// Restore state from previous page
const savedVolume = parseFloat(localStorage.getItem('audioVolume') || '0');
const savedTime = parseFloat(localStorage.getItem('audioTime') || '0');
audio.volume = savedVolume;
if (volumeSlider) {
   volumeSlider.value = savedVolume;
   if (savedVolume > 0) volumeSlider.classList.add('active');
}
audio.currentTime = savedTime;

// Save time before leaving page
window.addEventListener('beforeunload', () => {
   localStorage.setItem('audioTime', audio.currentTime);
   localStorage.setItem('audioVolume', audio.volume);
});
</script>
<script>
document.querySelectorAll('.footer-link').forEach(link => {
   link.classList.remove('active-page');
});
document.querySelector('a[href="../docs/index.html"]')?.classList.add('active-page');
</script>
</body>
</html>
