<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reconocer — Sobre el proyecto</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main style="padding:20px; min-height:calc(100vh - 85px);">
        <h1>Sobre el proyecto</h1>
        <p>Documentación y notas del proyecto.</p>
    </main>

    <footer class="site-footer">
        <button class="sound-btn" id="sound-btn" aria-label="sonido">
            <span class="sound-icon"></span>
            <input type="range" class="volume-slider" id="volume-slider" 
                   min="0" max="1" step="0.05" value="1" 
                   onclick="event.stopPropagation()">
        </button>
        <div class="footer-left">
            <a href="../index.html" class="footer-link">INICIO</a>
        </div>
        <div class="footer-center">
            <a href="../map.html" class="footer-link">CARTOGRAFÍA</a>
        </div>
    </footer>
    <script>
    document.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', function(e) {
            const href = this.getAttribute('href');
            if (!href || href.startsWith('#') || href.startsWith('javascript')) return;
            e.preventDefault();
            document.body.style.transition = 'opacity 350ms ease';
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = href; }, 360);
        });
    });
    </script>
    <script>
    const soundBtn = document.getElementById('sound-btn');
    const volumeSlider = document.getElementById('volume-slider');

    if (soundBtn) {
        soundBtn.addEventListener('click', function() {
            this.classList.toggle('muted');
            if (volumeSlider) {
                volumeSlider.value = this.classList.contains('muted') ? 0 : 1;
            }
        });
    }
    </script>
</body>
</html>
