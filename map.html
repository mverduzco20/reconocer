<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconocer — Mapa</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="map-container">
        <div id="mapa"></div>

        <nav id="categories-nav" class="categories-open">
            <div class="categories-wrapper">
                <div class="cat-rects" aria-hidden="true">
                    <div class="cat-rect memoria" data-for="memoria-button"></div>
                    <div class="cat-rect oficio" data-for="oficio-button"></div>
                    <div class="cat-rect refugio" data-for="refugio-button"></div>
                    <div class="cat-rect encuentro" data-for="encuentro-button"></div>
                </div>
                <div class="cat-buttons">
                    <button class="category-button" id="memoria-button" data-category="m"><span class="label">MEMORIA</span><span class="swatch"></span></button>
                    <button class="category-button" id="oficio-button" data-category="o"><span class="label">OFICIO</span><span class="swatch"></span></button>
                    <button class="category-button" id="refugio-button" data-category="r"><span class="label">REFUGIO</span><span class="swatch"></span></button>
                    <button class="category-button" id="encuentro-button" data-category="e"><span class="label">ENCUENTRO</span><span class="swatch"></span></button>
                </div>
            </div>
        </nav>

        <footer class="site-footer">
            <div class="footer-left">
                <a href="./docs/index.html" class="footer-link">SOBRE EL PROYECTO</a>
            </div>
            <div class="footer-center">
                <button class="footer-link" id="categories-button">CATEGORÍAS</button>
            </div>
            <div class="footer-right">
                <button class="sound-btn" aria-label="sonido">
                    <img src="./img/sonido.png" alt="sonido">
                </button>
            </div>
        </footer>
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <script src="./js/secrets.js"></script>
    <script src="./js/map.js"></script>
</body>
</html>
