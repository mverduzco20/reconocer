<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remote Page Control</title>
  <link rel="canonical" href="https://runentestudio.github.io/demos/remotecontrol/pageControl.html">
  <meta http-equiv="refresh" content="0; url=https://runentestudio.github.io/demos/remotecontrol/pageControl.html">
  <script src="./js/ws-config.js"></script>
</head>
<body>
  <p>
  Redirigiendo al control remoto…
  <a id="remote-control-link" href="https://runentestudio.github.io/demos/remotecontrol/pageControl.html">Abrir panel de control</a>
  </p>
  <script>
    const remoteUrl = (window.RECONOCER_WS && window.RECONOCER_WS.remoteControlUrl)
      || "https://runentestudio.github.io/demos/remotecontrol/pageControl.html";
    const link = document.getElementById("remote-control-link");
    if (link) link.href = remoteUrl;
    window.location.replace(remoteUrl);
  </script>
</body>
</html>
