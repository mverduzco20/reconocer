name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Mapbox config for Pages
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          if [ -z "$MAPBOX_TOKEN" ]; then
            echo "MAPBOX_TOKEN secret is missing. Cartography will not load on GitHub Pages."
            exit 0
          fi
          cat > js/secrets.js <<EOF
          window.TOKEN = "${MAPBOX_TOKEN}";
          window.MAPBOX_TOKEN = window.TOKEN;
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
