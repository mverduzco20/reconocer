<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconocer</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <main id="home">
        
        <section id="hero" style="height:calc(100vh - 85px); display:flex; align-items:center; justify-content:center;">
            <div>
                <h1>RECONOCER</h1>
                <p>Bienvenido — desplázate hacia abajo para más contenido.</p>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <button class="sound-btn" id="sound-btn" aria-label="sonido">
            <span class="sound-icon"></span>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1"
                onclick="event.stopPropagation()">
        </button>
        <div class="footer-left">
            <a href="./docs/index.html" class="footer-link">SOBRE EL PROYECTO</a>
        </div>
        <div class="footer-center">
            <a href="./map.html" class="footer-link" id="categories-button">CARTOGRAFÍA</a>
        </div>
    </footer>
    <!-- 
    <prompt>
     - Crea con mapbox un mapa en 'reconocer.html'
    - Define marcadores para las ubicaciones dentro del archivo './csv/reconocer.csv'
    - Define un archivo js para controlar las acciones y configuraciones de mapbox, el archivo se tiene que llamar './js/reconocer.js'
    - Los marcadores serán imágenes de 64x64px, define un placeholder, será reemplazado posteriormente por thumbs
    </prompt>
    -->
    <!-- Map scripts only load on map.html to avoid initializing map on Home -->
    <script>
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function (e) {
                const href = this.getAttribute('href');
                if (!href || href.startsWith('#') || href.startsWith('javascript')) return;
                e.preventDefault();
                document.body.style.transition = 'opacity 350ms ease';
                document.body.style.opacity = '0';
                setTimeout(() => { window.location.href = href; }, 360);
            });
        });
    </script>
    <script>
        const soundBtn = document.getElementById('sound-btn');
        const volumeSlider = document.getElementById('volume-slider');

        if (soundBtn) {
            soundBtn.addEventListener('click', function () {
                this.classList.toggle('muted');
                if (volumeSlider) {
                    volumeSlider.value = this.classList.contains('muted') ? 0 : 1;
                }
            });
        }
    </script>
</body>

</html>
