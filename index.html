<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconocer</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
<audio id="global-audio" loop preload="auto">
   <source src="./audio/Sonidopag-.mp4" type="video/mp4">
</audio>
    <main id="home">
        <section id="hero" style="display:flex; align-items:center; justify-content:center; position:relative;">
            <div id="hero-collage" class="hero-collage" aria-hidden="true"></div>
            <div class="hero-content">
                <h1><span class="reconocer-title">{0e}</span>conocer</h1>
                <p>Bienvenido — Desplázate hacia abajo para más contenido.</p>
            </div>
            <img src="./img/logocentroazul.png" alt="logo" style="position:absolute; top:12px; left:18px; height:20px; width:auto;">
            <div style="position:absolute; top:12px; left:50%; transform:translateX(-50%); text-align:center; font-family:'Courier New', Courier, monospace; font-size:12px; font-weight:bold; color:#0000ff; letter-spacing:1px; width:auto;">
                <p style="margin:0 0 8px 0;">Scroll para<br>seguir explorando</p>
                <div style="width:1px; height:28px; background:#0000ff; margin:0 auto;"></div>
            </div>
        </section>

        <section id="map-preview" style="height:4188px; position:relative;">
            <div style="position:sticky; top:0; height:100vh; overflow:hidden; margin-top:3188px;">
                <iframe 
                    src="./map.html" 
                    style="width:100%; height:100%; border:none;"
                    scrolling="no"
                    id="map-iframe">
                </iframe>
            </div>
        </section>
    </main>

    <footer class="site-footer">
       <button class="sound-btn" id="sound-btn" aria-label="sonido">
           <span class="sound-icon"></span>
           <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="0"
               onclick="event.stopPropagation()">
       </button>
       <div class="footer-left" style="margin-left: 30px; flex: 1;">
           <a href="./docs/index.html" class="footer-link footer-link-lg">(SOBRE EL PROYECTO)</a>
       </div>
       <div class="footer-center" style="position:absolute; left:50%; transform:translateX(-50%);">
           <a href="./index.html" class="footer-link footer-link-lg active-page">(INICIO)</a>
       </div>
       <div class="footer-right" style="margin-right: 30px;">
           <a href="./map.html" class="footer-link footer-link-lg">(CARTOGRAFÍA)</a>
       </div>
    </footer>
    <!-- 
    <prompt>
     - Crea con mapbox un mapa en 'reconocer.html'
    - Define marcadores para las ubicaciones dentro del archivo './csv/reconocer.csv'
    - Define un archivo js para controlar las acciones y configuraciones de mapbox, el archivo se tiene que llamar './js/reconocer.js'
    - Los marcadores serán imágenes de 64x64px, define un placeholder, será reemplazado posteriormente por thumbs
    </prompt>
    -->
    <!-- Map scripts only load on map.html to avoid initializing map on Home -->
    <script>
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function (e) {
                const href = this.getAttribute('href');
                if (!href || href.startsWith('#') || href.startsWith('javascript')) return;
                e.preventDefault();
                document.body.style.transition = 'opacity 600ms ease';
                document.body.style.opacity = '0';
                setTimeout(() => { window.location.href = href; }, 360);
            });
        });
    </script>
    <script>
const audio = document.getElementById('global-audio');
const volumeSlider = document.getElementById('volume-slider');

// Start muted
audio.volume = 0;
audio.play().catch(() => {});

if (volumeSlider) {
   volumeSlider.value = 0;

   volumeSlider.addEventListener('input', function(e) {
       e.stopPropagation();
       const val = parseFloat(this.value);
       audio.volume = val;
       const isOn = val > 0;
       this.classList.toggle('active', isOn);
       // Save state
       localStorage.setItem('audioVolume', val);
       localStorage.setItem('audioTime', audio.currentTime);
   });

   volumeSlider.addEventListener('click', function(e) {
       e.stopPropagation();
       if (parseFloat(this.value) === 0) {
           this.value = 1;
           audio.volume = 1;
           this.classList.add('active');
           localStorage.setItem('audioVolume', 1);
       }
   });
}

// Restore state from previous page
const savedVolume = parseFloat(localStorage.getItem('audioVolume') || '0');
const savedTime = parseFloat(localStorage.getItem('audioTime') || '0');
audio.volume = savedVolume;
if (volumeSlider) {
   volumeSlider.value = savedVolume;
   if (savedVolume > 0) volumeSlider.classList.add('active');
}
audio.currentTime = savedTime;

// Save time before leaving page
window.addEventListener('beforeunload', () => {
   localStorage.setItem('audioTime', audio.currentTime);
   localStorage.setItem('audioVolume', audio.volume);
});
</script>
<script>
document.querySelectorAll('.footer-link').forEach(link => {
   link.classList.remove('active-page');
});
document.querySelector('a[href="./index.html"]')?.classList.add('active-page');
</script>
<script>
window.addEventListener('load', () => {
   window.scrollTo({ top: 0, behavior: 'instant' });
});
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
   const host = document.getElementById('hero-collage');
   if (!host) return;

   const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
   const tileDelay = 0.05;
   const startDelay = 0.45;
   const tileDuration = 0.6;

   function useSvgFallback() {
      host.classList.add('hero-collage--fallback');
      host.style.opacity = reducedMotion ? '1' : '';
   }

   fetch('./img/home-collage.svg')
      .then(function (res) {
         if (!res.ok) throw new Error('svg fetch failed');
         return res.text();
      })
      .then(function (svgText) {
         svgText = svgText.replace(/xlink:href="([^"]+)"/g, function (_, path) {
            if (path.charAt(0) === '#' || path.indexOf('./img/') === 0 || path.indexOf('http') === 0 || path.indexOf('data:') === 0) {
               return 'xlink:href="' + path + '"';
            }
            return 'xlink:href="./img/' + path + '"';
         });
         host.innerHTML = svgText;
         const svg = host.querySelector('svg');
         if (svg) {
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');
            svg.setAttribute('preserveAspectRatio', 'xMidYMid slice');
         }

         const tiles = host.querySelectorAll('image, use');
         if (!tiles.length) {
            useSvgFallback();
            return;
         }

         host.classList.add('is-ready');

         if (reducedMotion) {
            tiles.forEach(function (tile) { tile.style.opacity = '1'; });
            return;
         }

         tiles.forEach(function (tile, i) {
            tile.style.opacity = '0';
            tile.style.animation = 'homeTileIn ' + tileDuration + 's ease forwards';
            tile.style.animationDelay = (startDelay + i * tileDelay) + 's';
         });
      })
      .catch(useSvgFallback);
});
</script>
</body>

</html>
