        document.querySelectorAll('a').forEach(link => {

                if (!href || href.startsWith('#') || href.startsWith('javascript')) return;
                e.preventDefault();
                document.body.style.transition = 'opacity 600ms ease';
                document.body.style.opacity = '0';
                setTimeout(() => { window.location.href = href; }, 360);
            });
        });
    </script>
    <script>
const audio = document.getElementById('global-audio');
const volumeSlider = document.getElementById('volume-slider');

// Start muted
audio.volume = 0;
audio.play().catch(() => {});

if (volumeSlider) {
   volumeSlider.value = 0;

   volumeSlider.addEventListener('input', function(e) {
       e.stopPropagation();
       const val = parseFloat(this.value);
       audio.volume = val;
       const isOn = val > 0;
       this.classList.toggle('active', isOn);
       // Save state
       localStorage.setItem('audioVolume', val);
       localStorage.setItem('audioTime', audio.currentTime);
   });

   volumeSlider.addEventListener('click', function(e) {
       e.stopPropagation();
       if (parseFloat(this.value) === 0) {
           this.value = 1;
           audio.volume = 1;
           this.classList.add('active');
           localStorage.setItem('audioVolume', 1);
       }
   });
}

// Restore state from previous page
const savedVolume = parseFloat(localStorage.getItem('audioVolume') || '0');
const savedTime = parseFloat(localStorage.getItem('audioTime') || '0');
audio.volume = savedVolume;
if (volumeSlider) {
   volumeSlider.value = savedVolume;
   if (savedVolume > 0) volumeSlider.classList.add('active');
}
audio.currentTime = savedTime;

// Save time before leaving page
window.addEventListener('beforeunload', () => {
   localStorage.setItem('audioTime', audio.currentTime);
   localStorage.setItem('audioVolume', audio.volume);
});
</script>

<script>

<script>
document.addEventListener('DOMContentLoaded', function () {
   const host = document.getElementById('hero-collage');
   if (!host) return;

   const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
   const tileDelay = 0.05;
   const startDelay = 0.45;
   const tileDuration = 0.6;

   function useSvgFallback() {
      host.classList.add('hero-collage--fallback');
      host.style.opacity = reducedMotion ? '1' : '';
   }

   fetch('./img/home-collage.svg')
      .then(function (res) {
         if (!res.ok) throw new Error('svg fetch failed');
         return res.text();
      })
      .then(function (svgText) {
         svgText = svgText.replace(/xlink:href="([^"]+)"/g, function (_, path) {
            if (path.charAt(0) === '#' || path.indexOf('./img/') === 0 || path.indexOf('http') === 0 || path.indexOf('data:') === 0) {
               return 'xlink:href="' + path + '"';
            }
            return 'xlink:href="./img/' + path + '"';
         });
         host.innerHTML = svgText;
         const svg = host.querySelector('svg');
         if (svg) {
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');
            svg.setAttribute('preserveAspectRatio', 'xMidYMid slice');
         }

         const tiles = host.querySelectorAll('image, use');
         if (!tiles.length) {
            useSvgFallback();
            return;
         }

         host.classList.add('is-ready');

         if (reducedMotion) {
            tiles.forEach(function (tile) { tile.style.opacity = '1'; });
            positionCityImage();
            if (typeof alignHeroSubtitles === 'function') alignHeroSubtitles();
            return;
         }

         tiles.forEach(function (tile, i) {
            tile.style.opacity = '0';
            tile.style.animation = 'homeTileIn ' + tileDuration + 's ease forwards';
            tile.style.animationDelay = (startDelay + i * tileDelay) + 's';
         });

         positionCityImage();
      })
      .catch(useSvgFallback);
});

const CITY_STICKY_GAP_CM = 7;
const INSTRUCTION_SIDE_MARGIN_CM = 5;

function cityStickyGapPx() {
   return CITY_STICKY_GAP_CM * 96 / 2.54;
}

function positionInstructionIcons() {
   const city = document.querySelector('img[alt="city"]');
   const row = document.getElementById('home-instructions');
   if (!city || !row) return;

   const gapPx = cityStickyGapPx();
   const cityBottom = city.offsetTop + city.offsetHeight;

   row.style.position = 'absolute';
   row.style.left = '0';
   row.style.width = '100%';
   row.style.paddingLeft = INSTRUCTION_SIDE_MARGIN_CM + 'cm';
   row.style.paddingRight = INSTRUCTION_SIDE_MARGIN_CM + 'cm';
   row.style.boxSizing = 'border-box';
   row.style.display = 'flex';
   row.style.justifyContent = 'flex-start';
   row.style.alignItems = 'center';
   row.style.zIndex = '1002';
   row.style.pointerEvents = 'none';
   row.style.top = cityBottom + 'px';
   row.style.height = gapPx + 'px';

   const iconSize = Math.round(gapPx * 0.95);
   const smallIconSize = Math.round(iconSize * 0.5508);
   const firstTwoIconSize = Math.round(smallIconSize * 0.855);

   row.querySelectorAll('.home-instruction-item').forEach(function (item, index) {
      const img = item.querySelector('img');
      if (!img) return;
      const size = index < 2 ? firstTwoIconSize : smallIconSize;
      img.style.width = size + 'px';
      img.style.height = size + 'px';
      img.style.maxWidth = size + 'px';
      img.style.maxHeight = size + 'px';
      img.style.objectFit = 'contain';
      item.style.flex = '0 0 auto';
      item.style.marginLeft = '0';
   });

   const items = Array.prototype.slice.call(row.querySelectorAll('.home-instruction-item'));
   const rowStyles = window.getComputedStyle(row);
   const innerWidth = row.clientWidth
      - parseFloat(rowStyles.paddingLeft)
      - parseFloat(rowStyles.paddingRight);
   const totalIconWidth = items.reduce(function (sum, item) {
      return sum + item.offsetWidth;
   }, 0);
   const betweenGap = items.length > 1
      ? Math.max(0, (innerWidth - totalIconWidth) / (items.length - 1))
      : 0;

   items.forEach(function (item, index) {
      item.style.marginLeft = index === 0 ? '0' : betweenGap + 'px';
   });
}

function positionMapPreview() {
   const city = document.querySelector('img[alt="city"]');
   const mapPreview = document.getElementById('map-preview');
   const stickyWrap = document.getElementById('map-sticky-wrap');
   const hero = document.getElementById('hero');
   if (!city || !mapPreview || !stickyWrap || !hero) return;

   const gapPx = cityStickyGapPx();
   const cityBottom = city.offsetTop + city.offsetHeight;
   const heroBottom = hero.offsetTop + hero.offsetHeight;
   const marginTop = Math.max(0, Math.round(cityBottom + gapPx - heroBottom));

   stickyWrap.style.marginTop = marginTop + 'px';
   mapPreview.style.height = (marginTop + window.innerHeight + 1000) + 'px';
   positionInstructionIcons();
}

function positionCityImage() {
   const home = document.getElementById('home');
   const city = document.querySelector('img[alt="city"]');
   const hero = document.getElementById('hero');
   const svg = document.querySelector('#hero-collage svg');
   if (!home || !city || !hero || !svg) return;

   if (!city.complete || !city.naturalHeight) {
      city.addEventListener('load', positionCityImage, { once: true });
      return;
   }

   home.style.position = 'relative';

   let maxBottom = 0;
   svg.querySelectorAll('image, use').forEach(function (el) {
      try {
         const box = el.getBBox();
         maxBottom = Math.max(maxBottom, box.y + box.height);
      } catch (e) {}
   });

   const vb = svg.viewBox.baseVal;
   if (!vb || !vb.height) return;

   const scale = hero.offsetHeight / vb.height;
   const cityDropCm = 2.16;
   city.style.position = 'absolute';
   city.style.top = (hero.offsetTop + maxBottom * scale + 140 + cityDropCm * 96 / 2.54) + 'px';
   city.style.right = '0';
   city.style.bottom = 'auto';

   positionMapPreview();
   if (typeof alignHeroSubtitles === 'function') alignHeroSubtitles();
}

window.addEventListener('resize', positionCityImage);
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
   const contexto = document.querySelector('.contexto-img');
   const mapPreview = document.getElementById('map-preview');
   if (!contexto || !mapPreview) return;

   function updateContexto() {
      const heroBottom = mapPreview.getBoundingClientRect().top;
      const show = heroBottom < window.innerHeight - 80;
      contexto.classList.toggle('is-visible', show);
   }

   window.addEventListener('scroll', updateContexto, { passive: true });
   window.addEventListener('resize', updateContexto);
   updateContexto();
});
</script>
<script>
(function () {
   if (!/^(localhost|127\.0\.0\.1)$/.test(location.hostname)) return;
   var files = ['./index.html', './css/style.css'];
   var stamps = {};
   function check() {
      files.forEach(function (url) {
         fetch(url, { cache: 'no-store', method: 'HEAD' }).then(function (res) {
            var lm = res.headers.get('Last-Modified') || res.headers.get('ETag') || '';
            if (stamps[url] && stamps[url] !== lm) location.reload();
            stamps[url] = lm;
         }).catch(function () {});
      });
   }
   check();
   setInterval(check, 1000);
})();
</script>
<script>
(function() {
    var top1 = document.querySelector('.hero-subtitle-top');
    var bot = document.querySelector('.hero-subtitle-bottom');

    function place(el) {
        if (!el) return;
        var parent = el.parentElement;
        if (!parent) return;
        var rect = el.getBoundingClientRect();
        var parentRect = parent.getBoundingClientRect();
        el.style.position = 'absolute';
        el.style.top = (rect.top - parentRect.top) + 'px';
        el.style.left = (rect.left - parentRect.left) + 'px';
        el.style.right = 'auto';
        el.style.bottom = 'auto';
        el.style.transform = 'none';
    }

    function getTileRects(svg) {
        var rects = [];
        svg.querySelectorAll('image, use').forEach(function (tile) {
            try {
                var r = tile.getBoundingClientRect();
                if (r.width < 30 || r.height < 30) return;
                rects.push({
                    top: r.top,
                    bottom: r.bottom,
                    left: r.left,
                    right: r.right
                });
            } catch (e) {}
        });
        return rects;
    }

    function measureSubtitleGap(el, tiles) {
        if (!el || !tiles.length) return null;

        var sr = el.getBoundingClientRect();
        if (!sr.width || !sr.height) return null;

        var centerX = (sr.left + sr.right) / 2;

        var colTiles = tiles.filter(function (t) {
            return t.left <= centerX + 10 && t.right >= centerX - 10;
        });

        var above = null;
        var below = null;
        colTiles.forEach(function (t) {
            if (t.bottom <= sr.top + 3 && (!above || t.bottom > above.bottom)) above = t;
            if (t.top >= sr.bottom - 3 && (!below || t.top < below.top)) below = t;
        });

        return {
            el: el,
            sr: sr,
            above: above,
            below: below,
            gapMidY: above && below ? (above.bottom + below.top) / 2 : null
        };
    }

    var SUBTITLE_DROP_MM = 2;

    function mmToPx(mm) {
        return mm * 96 / 25.4;
    }

    function applySubtitlePosition(spec, parentRect) {
        if (!spec) return;

        var el = spec.el;
        var sr = spec.sr;
        var top = sr.top - parentRect.top;
        var left = sr.left - parentRect.left;

        if (spec.gapMidY != null) {
            top = spec.gapMidY - sr.height / 2 - parentRect.top;
        }

        top += mmToPx(SUBTITLE_DROP_MM + (el === bot ? 2 : 0));

        el.style.position = 'absolute';
        el.style.top = top + 'px';
        el.style.left = left + 'px';
        el.style.right = 'auto';
        el.style.bottom = 'auto';
        el.style.transform = 'none';
    }

    function resetForMeasure(el) {
        if (!el) return;
        el.style.removeProperty('position');
        el.style.removeProperty('top');
        el.style.removeProperty('left');
        el.style.removeProperty('right');
        el.style.removeProperty('bottom');
        el.style.removeProperty('transform');
    }

    function alignHeroSubtitles() {
        var svg = document.querySelector('#hero-collage svg');
        var parent = top1 && top1.parentElement;
        if (!svg || !parent) {
            if (top1) place(top1);
            if (bot) place(bot);
            return;
        }

        resetForMeasure(top1);
        resetForMeasure(bot);

        var tiles = getTileRects(svg);
        var parentRect = parent.getBoundingClientRect();

        applySubtitlePosition(measureSubtitleGap(top1, tiles), parentRect);
        applySubtitlePosition(measureSubtitleGap(bot, tiles), parentRect);
    }

    window.alignHeroSubtitles = alignHeroSubtitles;

    function lockPositions() {
        alignHeroSubtitles();
    }

    window.addEventListener('load', lockPositions);
    window.addEventListener('resize', lockPositions);
    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(lockPositions);
    }
})();
</script>
